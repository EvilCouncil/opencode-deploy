services:
  opencode:
    image: ghcr.io/evilcouncil/opencode-docker:v1.17.18.1
    container_name: opencode
    ports:
      - "4096:4096"
    environment:
      UI_PASSWORD: ${UI_PASSWORD}
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4096/global/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /srv/opencode:/workspace
      - /srv/opencode-homedir:/home/opencode:z

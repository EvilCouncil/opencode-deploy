name: Lint

on:
  push:
    paths:
      - "docker-compose.yml"
  pull_request:
    paths:
      - "docker-compose.yml"

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet
